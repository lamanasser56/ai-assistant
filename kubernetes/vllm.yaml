############################################################
# DEPRECATED
#
# Old combined manifest containing PVC + Deployment + Service.
#
# Superseded by:
# - kubernetes/namespace.yaml
# - kubernetes/assistant/deployment.yaml
# - kubernetes/assistant/service.yaml
#
# Keep only for historical reference.
# Do NOT apply this manifest.
############################################################
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: huggingface-cache
  namespace: ai-llm
  labels:
    app.kubernetes.io/name: vllm
    app.kubernetes.io/part-of: ai-assistant
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 30Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: ai-llm
  labels:
    app.kubernetes.io/name: vllm
    app.kubernetes.io/part-of: ai-assistant
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm
        app.kubernetes.io/part-of: ai-assistant
    spec:
      nodeSelector:
        nvidia.com/gpu.present: "true"
        nvidia.com/gpu.product: "Tesla-T4"
      terminationGracePeriodSeconds: 60
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.6.3
          imagePullPolicy: IfNotPresent
          args:
            - --model
            - Qwen/Qwen2.5-7B-Instruct-AWQ
            - --served-model-name
            - assistant
            - --quantization
            - awq
            - --dtype
            - half
            - --max-model-len
            - "4096"
            - --gpu-memory-utilization
            - "0.85"
            - --max-num-seqs
            - "4"
            - --host
            - 0.0.0.0
            - --port
            - "8000"
          env:
            - name: HF_HOME
              value: /models/huggingface
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: "2"
              memory: 10Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: 14Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: huggingface-cache
              mountPath: /models/huggingface
            - name: shared-memory
              mountPath: /dev/shm
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 120
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: huggingface-cache
          persistentVolumeClaim:
            claimName: huggingface-cache
        - name: shared-memory
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: ai-llm
  labels:
    app.kubernetes.io/name: vllm
    app.kubernetes.io/part-of: ai-assistant
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: vllm
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
