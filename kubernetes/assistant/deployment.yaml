############################################################
# CANONICAL PRODUCTION MANIFEST
#
# Official vLLM Deployment manifest for Phase 1.
# Maintain and apply this file.
############################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: ai-llm
  labels:
    app.kubernetes.io/name: vllm
    app.kubernetes.io/component: assistant
    app.kubernetes.io/part-of: ai-assistant
spec:
  replicas: 1

  strategy:
    type: Recreate

  selector:
    matchLabels:
      app.kubernetes.io/name: vllm

  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm
        app.kubernetes.io/component: assistant
        app.kubernetes.io/part-of: ai-assistant

    spec:
      enableServiceLinks: false
      terminationGracePeriodSeconds: 60

      nodeSelector:
        nvidia.com/gpu.present: "true"
        nvidia.com/gpu.product: Tesla-T4

      containers:
        - name: vllm
          image: lamai7/vllm-qwen2.5-7b-awq:0.1.0
          imagePullPolicy: IfNotPresent

          args:
            - --model
            - /models/qwen2.5-7b-instruct-awq
            - --served-model-name
            - assistant
            - --quantization
            - awq
            - --dtype
            - half
            - --max-model-len
            - "4096"
            - --gpu-memory-utilization
            - "0.85"
            - --max-num-seqs
            - "8"
            - --host
            - 0.0.0.0
            - --port
            - "8000"


          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          resources:
            requests:
              cpu: "2"
              memory: 10Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: 14Gi
              nvidia.com/gpu: "1"

          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 120

          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: shared-memory
              mountPath: /dev/shm

      volumes:

        - name: shared-memory
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
