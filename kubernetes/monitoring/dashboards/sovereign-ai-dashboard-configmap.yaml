apiVersion: v1
kind: ConfigMap
metadata:
  name: sovereign-ai-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  sovereign-ai.json: |-
    {"title":"Sovereign AI Assistant Platform","uid":"sovereign-ai-platform","schemaVersion":39,"refresh":"30s","time":{"from":"now-6h","to":"now"},"panels":[
      {"type":"timeseries","title":"Namespace CPU usage","id":1,"targets":[{"expr":"sum(rate(container_cpu_usage_seconds_total{namespace=\"ai-llm\",container!=\"\",image!=\"\"}[5m]))"}]},
      {"type":"timeseries","title":"Namespace memory usage","id":2,"targets":[{"expr":"sum(container_memory_working_set_bytes{namespace=\"ai-llm\",container!=\"\",image!=\"\"})"}]},
      {"type":"timeseries","title":"CPU usage by pod","id":3,"targets":[{"expr":"sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"ai-llm\",container!=\"\",image!=\"\"}[5m]))"}]},
      {"type":"timeseries","title":"Memory usage by pod","id":4,"targets":[{"expr":"sum by (pod) (container_memory_working_set_bytes{namespace=\"ai-llm\",container!=\"\",image!=\"\"})"}]},
      {"type":"stat","title":"Pod readiness","id":5,"targets":[{"expr":"sum(kube_pod_status_ready{namespace=\"ai-llm\",condition=\"true\"})"}]},
      {"type":"timeseries","title":"Pod restart count","id":6,"targets":[{"expr":"sum by (pod) (increase(kube_pod_container_status_restarts_total{namespace=\"ai-llm\"}[24h]))"}]},
      {"type":"timeseries","title":"vLLM request rate","id":7,"targets":[{"expr":"sum(rate(vllm:request_success_total[5m]))"}]},
      {"type":"timeseries","title":"vLLM p95 latency","id":8,"targets":[{"expr":"histogram_quantile(0.95, sum by (le) (rate(vllm:e2e_request_latency_seconds_bucket[5m])))"}]}
    ]}
